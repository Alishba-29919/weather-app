<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    <div class="bg-glow"></div>
    
    <main class="app-container">
        <header class="search-group">
            <input type="text" id="city-input" placeholder="Enter City (e.g. Bahawalpur)" autocomplete="off">
            <button id="search-btn">
                <i class="fa-solid fa-magnifying-glass"></i>
            </button>
        </header>

        <section class="weather-card">
            <div class="main-info">
                <h1 id="city-name">Searching...</h1>
                <div class="temp-container">
                    <span id="temp-value">--</span><span class="degree">°</span>
                </div>
                <p id="weather-desc">Enter city to start</p>
            </div>

            <div class="stats-grid">
                <div class="stat-item">
                    <span>Humidity</span>
                    <strong id="humidity">--%</strong>
                </div>
                <div class="stat-item">
                    <span>Wind</span>
                    <strong id="wind">-- km/h</strong>
                </div>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
